<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carta — Black Pork Ontiyent</title>
  <meta name="description" content="Carta digital de Black Pork Ontiyent — tablas, entrantes, tostadas, bocadillos, postres y bodega." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Cormorant+SC:wght@500;600;700&family=Inter+Tight:wght@400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Header / portada -->
  <header class="masthead">
    <div class="masthead__inner">
      <p class="masthead__eyebrow">Casa · Bar · Cocina</p>
      <h1 class="masthead__title">
        <span class="word">Black</span>
        <span class="word word--accent">Pork</span>
      </h1>
      <p class="masthead__sub">Ontinyent — Carta de la casa</p>
      <div class="masthead__rule" aria-hidden="true">
        <span></span><em>·</em><span></span>
      </div>
    </div>
  </header>

  <!-- Buscador y navegación de secciones -->
  <div class="toolbar" id="toolbar">
    <div class="toolbar__inner">
      <label class="search">
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
          <circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="1.6"/>
          <line x1="16.5" y1="16.5" x2="21" y2="21" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
        <input id="search" type="search" placeholder="Buscar plato, bebida, ingrediente…" autocomplete="off" />
        <button type="button" id="searchClear" class="search__clear" aria-label="Limpiar búsqueda" hidden>×</button>
      </label>
      <nav class="sectionNav" id="sectionNav" aria-label="Secciones de la carta"></nav>
    </div>
  </div>

  <!-- Contenido del menú -->
  <main id="menu" class="menu" aria-busy="true">
    <p class="loading">Sirviendo la carta…</p>
  </main>

  <!-- Pie -->
  <footer class="foot">
    <div class="foot__rule" aria-hidden="true"></div>
    <p>Los precios incluyen impuestos. Si tienes cualquier alergia o intolerancia, consúltanos antes de pedir.</p>
    <p class="foot__sign">Black Pork · Ontinyent</p>
  </footer>

  <!-- Botón volver arriba -->
  <button id="toTop" class="toTop" type="button" aria-label="Volver arriba" hidden>↑</button>

  <script src="app.js"></script>
</body>
</html>
