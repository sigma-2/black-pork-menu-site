<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Menú</title>
</head>
<body>
  <h1>Menú</h1>
  <pre id="output"></pre>

  <script>
    fetch('./data/menu.json')
      .then(response => response.json())
      .then(data => {
        document.getElementById('output').textContent = JSON.stringify(data, null, 2);
      });
  </script>
</body>
</html>
